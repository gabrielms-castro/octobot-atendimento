services:

  evolution-api:
    container_name: octobot-evolution_api
    image: evoapicloud/evolution-api:latest
    restart: always
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - evolution_instances:/evolution/instances
    depends_on:
      - postgres
      - redis
    networks:
      - app_net

  postgres:
    container_name: octobot-postgres
    image: postgres:15
    command: ["postgres", "-c", "max_connections=1000"]
    restart: always
    ports:
      - 5432:5432
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_DB=evolution
      - TZ=America/Sao_Paulo
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d evolution"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - app_net

  redis:
    image: redis:latest
    container_name: octobot-redis
    command: >
      redis-server --port 6379 --appendonly yes
    volumes:
      - redis:/data
    ports:
      - 6379:6379
    networks:
      - app_net
  
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: octobot-n8n
    restart: always
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost         
      - N8N_PORT=5678
      - WEBHOOK_URL=http://localhost:5678
      - TZ=America/Sao_Paulo
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_net

volumes:
  evolution_instances:
  postgres_data:
  redis:
  n8n_data:

networks:
  app_net:
    driver: bridge