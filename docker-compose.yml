services:

  evolution-api:
    container_name: octobot-evolution-api
    image: evoapicloud/evolution-api:v2.2.3
    restart: always
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - evolution_instances:/evolution/instances
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app_net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512m

  postgres:
    container_name: octobot-postgres
    image: postgres:15
    command: ["postgres", "-c", "max_connections=200", "-c", "timezone=UTC"]
    restart: always
    expose:
      - "5432"
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_DB=evolution
      - TZ=America/Sao_Paulo
      - PGTZ=UTC
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d evolution"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - db_net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512m

  redis:
    image: redis:7
    container_name: octobot-redis
    command: >
      redis-server --port 6379 --appendonly yes --requirepass ${REDIS_PASSWORD}
    restart: always
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - db_net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256m

  n8n:
    image: docker.n8n.io/n8nio/n8n:2.21.7
    container_name: octobot-n8n
    restart: always
    ports:
      - "5678:5678"
    expose:
      - "5679"
    environment:
      - N8N_HOST=${N8N_HOST}
      - N8N_PORT=5678
      - WEBHOOK_URL=${WEBHOOK_URL}
      - TZ=America/Sao_Paulo
      - N8N_RUNNERS_MODE=external
      - N8N_RUNNERS_BROKER_LISTEN_ADDRESS=0.0.0.0
      - N8N_RUNNERS_AUTH_TOKEN=${N8N_RUNNERS_AUTH_TOKEN}
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_net
      - db_net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 1g

  task-runners:
    image: n8nio/runners:2.21.7
    container_name: n8n-runners
    restart: always
    environment:
      - N8N_RUNNERS_TASK_BROKER_URI=http://n8n:5679
      - N8N_RUNNERS_AUTH_TOKEN=${N8N_RUNNERS_AUTH_TOKEN}
    volumes:
      - ./n8n-task-runners.json:/etc/n8n-task-runners.json:ro
      - ./n8n-runners-data:/home/node/.n8n
    depends_on:
      - n8n
    networks:
      - app_net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512m

volumes:
  evolution_instances:
  postgres_data:
  redis_data:
  n8n_data:
  n8n-runners-data:

networks:
  app_net:
    driver: bridge
  db_net:
    driver: bridge
    internal: true
